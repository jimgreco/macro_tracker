name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Transfer files to EC2
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 600 key.pem
          rsync -avz -e "ssh -i key.pem -o StrictHostKeyChecking=no" \
            --exclude '.git' \
            --exclude 'node_modules' \
            . ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/macros/

      - name: Rebuild and Restart Macros
        run: |
          ssh -i key.pem -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "cd ~/deploy && docker-compose build macros && docker-compose up -d macros && docker system prune -f"
