name: TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Select Xcode 26
        run: |
          set -euo pipefail
          ls /Applications | grep -i '^Xcode' || true
          for p in /Applications/Xcode_26.app /Applications/Xcode_26.0.app /Applications/Xcode_26.1.app /Applications/Xcode_26.2.app /Applications/Xcode-26.app /Applications/Xcode.app; do
            if [ -d "$p" ]; then
              sudo xcode-select -s "$p/Contents/Developer"
              echo "Selected: $p"
              break
            fi
          done
          xcodebuild -version

      - name: Validate secrets
        env:
          CERT_P12: ${{ secrets.IOS_DIST_CERT_P12 }}
          CERT_PWD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
          PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
          KC_PWD: ${{ secrets.KEYCHAIN_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          IOS_API_BASE_URL: ${{ secrets.IOS_API_BASE_URL }}
        run: |
          set -euo pipefail
          missing=0
          for name in CERT_P12 CERT_PWD PROFILE PROFILE_NAME KC_PWD TEAM_ID ASC_KEY_ID ASC_ISSUER_ID ASC_API_KEY IOS_API_BASE_URL; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret/env: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Import signing assets
        env:
          CERT_P12: ${{ secrets.IOS_DIST_CERT_P12 }}
          CERT_PWD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
          PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
          KC_PWD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain"

          security create-keychain -p "$KC_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KC_PWD" "$KEYCHAIN"

          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/[\"]//g')
          security default-keychain -s "$KEYCHAIN"

          printf '%s' "$CERT_P12" | base64 -d > "$RUNNER_TEMP/cert.p12"
          echo "p12 size: $(stat -f%z "$RUNNER_TEMP/cert.p12") bytes"

          if openssl pkcs12 -in "$RUNNER_TEMP/cert.p12" -noout -passin pass:"$CERT_PWD"; then
            echo "openssl pkcs12 verification: OK"
          else
            echo "openssl pkcs12 verification: FAILED"
            exit 1
          fi

          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PWD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KC_PWD" "$KEYCHAIN"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE_PATH="$HOME/Library/MobileDevice/Provisioning Profiles/dailymacros-app-store.mobileprovision"
          printf '%s' "$PROFILE" | base64 -d > "$PROFILE_PATH"

          PROFILE_PLIST=$(security cms -D -i "$PROFILE_PATH")
          echo "--- Provisioning profile ---"
          echo "Name:    $(echo "$PROFILE_PLIST" | plutil -extract Name raw -o - -)"
          echo "AppID:   $(echo "$PROFILE_PLIST" | plutil -extract Entitlements.application-identifier raw -o - -)"
          echo "Team:    $(echo "$PROFILE_PLIST" | plutil -extract TeamIdentifier.0 raw -o - -)"
          echo "Expires: $(echo "$PROFILE_PLIST" | plutil -extract ExpirationDate raw -o - -)"

          ACTUAL_PROFILE_NAME=$(echo "$PROFILE_PLIST" | plutil -extract Name raw -o - -)
          if [ "$ACTUAL_PROFILE_NAME" != "$PROFILE_NAME" ]; then
            echo "Provisioning profile name mismatch."
            echo "Expected IOS_PROVISIONING_PROFILE_NAME=$PROFILE_NAME"
            echo "Actual profile name=$ACTUAL_PROFILE_NAME"
            exit 1
          fi

      - name: Set up App Store Connect API key
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          KEY_FILE="$HOME/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8"
          printf '%s' "$API_KEY" > "$KEY_FILE"
          echo "API_KEY_PATH=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Archive
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          IOS_API_BASE_URL: ${{ secrets.IOS_API_BASE_URL }}
        run: |
          set -euo pipefail
          BUILD_NUMBER="$(git rev-list --count HEAD)"
          echo "Using build number: $BUILD_NUMBER"

          xcodebuild \
            -project ios/DailyMacros/DailyMacros.xcodeproj \
            -scheme DailyMacros \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/DailyMacros.xcarchive" \
            -destination 'generic/platform=iOS' \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            API_BASE_URL="$IOS_API_BASE_URL" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "$KEY_ID" \
            -authenticationKeyIssuerID "$ISSUER_ID" \
            archive

      - name: Export IPA
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>${TEAM_ID}</string>
            <key>signingStyle</key><string>manual</string>
            <key>signingCertificate</key><string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.dailymacros.app</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>stripSwiftSymbols</key><true/>
            <key>uploadSymbols</key><true/>
          </dict></plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/DailyMacros.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "$KEY_ID" \
            -authenticationKeyIssuerID "$ISSUER_ID"

          IPA_PATH="$(find "$RUNNER_TEMP/export" -name '*.ipa' -print -quit)"
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA exported"
            exit 1
          fi
          echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"

      - name: Upload to TestFlight
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -euo pipefail
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$KEY_ID" \
            --apiIssuer "$ISSUER_ID"

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain" || true
