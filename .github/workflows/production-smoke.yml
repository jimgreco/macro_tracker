name: Production Smoke

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Run production smoke checks
        env:
          PRODUCTION_BASE_URL: ${{ secrets.PRODUCTION_BASE_URL }}
          PRODUCTION_SMOKE_API_TOKEN: ${{ secrets.PRODUCTION_SMOKE_API_TOKEN }}
        run: |
          set -euo pipefail
          scripts/production-smoke.sh
