name: Production Smoke

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PRODUCTION_BASE_URL: ${{ secrets.PRODUCTION_BASE_URL }}
      PRODUCTION_SMOKE_API_TOKEN: ${{ secrets.PRODUCTION_SMOKE_API_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Skip when production URL is not configured
        if: env.PRODUCTION_BASE_URL == ''
        run: |
          echo "::notice::PRODUCTION_BASE_URL is not configured; skipping production smoke checks."

      - name: Run production smoke checks
        if: env.PRODUCTION_BASE_URL != ''
        run: |
          set -euo pipefail
          scripts/production-smoke.sh
