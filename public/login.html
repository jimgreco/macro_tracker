<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In - Macro Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #07090f;
        --card: rgba(13, 17, 30, 0.95);
        --line: rgba(0, 207, 255, 0.18);
        --text: #dce9ff;
        --muted: #5a6e8a;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
        background: #07090f;
        background-image:
          radial-gradient(ellipse at 18% 8%, rgba(0, 60, 100, 0.45) 0%, transparent 52%),
          radial-gradient(ellipse at 82% 92%, rgba(0, 80, 50, 0.3) 0%, transparent 48%);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 1rem;
      }

      .card {
        width: min(420px, 100%);
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--card);
        padding: 1.1rem;
        backdrop-filter: blur(14px);
        box-shadow: 0 20px 44px rgba(0, 0, 0, 0.6), 0 0 30px rgba(0, 207, 255, 0.06);
      }

      h1 {
        margin: 0;
        font-size: 1.5rem;
      }

      .login-brand {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        gap: 0.5rem;
        margin: 0 auto 0.35rem;
      }

      .login-brand-logo {
        width: 34px;
        height: 34px;
        filter: drop-shadow(0 5px 18px rgba(255, 45, 120, 0.55));
      }

      .login-brand-wordmark {
        font-size: 1.62rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        background: linear-gradient(95deg, #ff2d78 0%, #ff85c0 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      p {
        color: var(--muted);
      }

      .google-btn {
        width: 100%;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 0.75rem 0.9rem;
        background: rgba(0, 207, 255, 0.1);
        color: #00cfff;
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
        font-weight: 700;
        cursor: pointer;
        transition: background 140ms ease, box-shadow 140ms ease;
      }

      .google-btn:hover {
        background: rgba(0, 207, 255, 0.18);
        box-shadow: 0 4px 18px rgba(0, 207, 255, 0.2);
      }

      .error {
        margin-top: 0.8rem;
        color: #ff2d78;
        font-size: 0.9rem;
      }

      .version {
        margin-top: 0.8rem;
        margin-bottom: 0;
        font-size: 0.74rem;
        color: var(--muted);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="login-brand" aria-label="MacroFlow">
        <svg class="login-brand-logo" viewBox="0 0 64 64" role="img" aria-hidden="true" focusable="false">
          <defs>
            <linearGradient id="login-brand-grad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#ff2d78" />
              <stop offset="100%" stop-color="#ff85c0" />
            </linearGradient>
          </defs>
          <rect x="6" y="6" width="52" height="52" rx="14" fill="url(#login-brand-grad)" />
          <path d="M18 42V22h6l8 11 8-11h6v20h-6V31l-8 10-8-10v11z" fill="#fff" />
          <circle cx="50" cy="14" r="4" fill="#fff" />
        </svg>
        <span class="login-brand-wordmark">MacroFlow</span>
      </div>
      <p>Continue with your Google account to use the app.</p>
      <button id="google-login-btn" class="google-btn" type="button">
        Continue with Google
      </button>
      <p id="error" class="error" hidden>Google sign-in failed. Please try again.</p>
      <p id="login-version" class="version" hidden></p>
    </main>

    <script src="/login.js"></script>
  </body>
</html>
