<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In - Macro Tracker</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #07090f;
        --card: rgba(13, 17, 30, 0.95);
        --line: rgba(0, 207, 255, 0.18);
        --text: #dce9ff;
        --muted: #5a6e8a;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
        background: #07090f;
        background-image:
          radial-gradient(ellipse at 18% 8%, rgba(0, 60, 100, 0.45) 0%, transparent 52%),
          radial-gradient(ellipse at 82% 92%, rgba(0, 80, 50, 0.3) 0%, transparent 48%);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 1rem;
      }

      .card {
        width: min(420px, 100%);
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--card);
        padding: 1.1rem;
        backdrop-filter: blur(14px);
        box-shadow: 0 20px 44px rgba(0, 0, 0, 0.6), 0 0 30px rgba(0, 207, 255, 0.06);
      }

      h1 {
        margin: 0;
        font-size: 1.5rem;
      }

      .login-brand {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        gap: 0.5rem;
        margin: 0 auto 0.35rem;
      }

      .login-brand-logo {
        width: 34px;
        height: 34px;
        filter: drop-shadow(0 5px 18px rgba(255, 45, 120, 0.55));
      }

      .login-brand-wordmark {
        font-size: 1.62rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        background: linear-gradient(95deg, #ff2d78 0%, #ff85c0 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      p {
        color: var(--muted);
      }

      .login-buttons {
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
      }

      .login-btn {
        width: 100%;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 0.75rem 0.9rem;
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
        font-weight: 700;
        cursor: pointer;
        transition: background 140ms ease, box-shadow 140ms ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        font-size: 0.95rem;
      }

      .login-btn svg {
        width: 20px;
        height: 20px;
        flex-shrink: 0;
      }

      .google-btn {
        background: rgba(0, 207, 255, 0.1);
        color: #00cfff;
      }

      .google-btn:hover {
        background: rgba(0, 207, 255, 0.18);
        box-shadow: 0 4px 18px rgba(0, 207, 255, 0.2);
      }

      .apple-btn {
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
      }

      .apple-btn:hover {
        background: rgba(255, 255, 255, 0.18);
        box-shadow: 0 4px 18px rgba(255, 255, 255, 0.1);
      }

      .login-divider {
        display: flex;
        align-items: center;
        gap: 0.7rem;
        margin: 0;
        color: var(--muted);
        font-size: 0.78rem;
      }

      .login-divider::before,
      .login-divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--line);
      }

      .error {
        margin-top: 0.8rem;
        color: #ff2d78;
        font-size: 0.9rem;
      }

      .version {
        margin-top: 0.8rem;
        margin-bottom: 0;
        font-size: 0.74rem;
        color: var(--muted);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="login-brand" aria-label="DailyMacros">
        <svg class="login-brand-logo" viewBox="0 0 64 64" role="img" aria-hidden="true" focusable="false">
          <defs>
            <linearGradient id="login-brand-grad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#ff2d78" />
              <stop offset="100%" stop-color="#ff85c0" />
            </linearGradient>
          </defs>
          <rect x="6" y="6" width="52" height="52" rx="14" fill="url(#login-brand-grad)" />
          <text x="32" y="43" text-anchor="middle" font-family="'Avenir Next', 'Helvetica Neue', system-ui, sans-serif" font-weight="700" font-size="28" fill="#fff" letter-spacing="-2" opacity="0.95">DM</text>
          <rect x="14" y="48" width="36" height="2.5" rx="1.25" fill="#fff" opacity="0.4" />
        </svg>
        <span class="login-brand-wordmark">DailyMacros</span>
      </div>
      <p>Sign in to continue to the app.</p>
      <div class="login-buttons">
        <button id="google-login-btn" class="login-btn google-btn" type="button">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Continue with Google
        </button>
        <div class="login-divider">or</div>
        <button id="apple-login-btn" class="login-btn apple-btn" type="button">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C3.79 16.17 4.36 9.43 8.7 9.2c1.25.07 2.12.72 2.87.76.98-.2 1.92-.77 2.98-.7 1.26.1 2.2.6 2.82 1.5-2.58 1.54-1.97 4.93.36 5.88-.45 1.17-.67 1.7-1.24 2.72l-.44.92zM12.05 9.13C11.86 6.94 13.6 5.14 15.66 5c.32 2.44-2.22 4.27-3.61 4.13z"/></svg>
          Continue with Apple
        </button>
      </div>
      <p id="error" class="error" hidden>Sign-in failed. Please try again.</p>
      <p id="login-version" class="version" hidden></p>
    </main>

    <script src="/login.js"></script>
  </body>
</html>
