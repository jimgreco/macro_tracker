<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In - Macro Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #eef4ff;
        --card: rgba(255, 255, 255, 0.92);
        --line: #d3dfef;
        --text: #13233a;
        --muted: #53647d;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
        background: radial-gradient(circle at 15% 0%, #ffffff 0%, #e8f2ff 44%, #f2f6fe 100%);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 1rem;
      }

      .card {
        width: min(420px, 100%);
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--card);
        padding: 1.1rem;
        box-shadow: 0 20px 44px rgba(14, 30, 56, 0.14);
      }

      h1 {
        margin: 0;
        font-size: 1.5rem;
      }

      .login-brand {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        gap: 0.5rem;
        margin: 0 auto 0.35rem;
      }

      .login-brand-logo {
        width: 34px;
        height: 34px;
        filter: drop-shadow(0 5px 10px rgba(16, 43, 92, 0.2));
      }

      .login-brand-wordmark {
        font-size: 1.62rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        background: linear-gradient(95deg, #13335d 0%, #0f5fce 46%, #0a8a66 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      p {
        color: var(--muted);
      }

      .google-btn {
        width: 100%;
        border: 1px solid #ccd9ec;
        border-radius: 12px;
        padding: 0.75rem 0.9rem;
        background: #fff;
        color: #1b2d49;
        font-weight: 700;
        cursor: pointer;
      }

      .google-btn:hover {
        background: #f8fbff;
      }

      .error {
        margin-top: 0.8rem;
        color: #a12f2f;
        font-size: 0.9rem;
      }

      .version {
        margin-top: 0.8rem;
        margin-bottom: 0;
        font-size: 0.74rem;
        color: #6a7890;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="login-brand" aria-label="MacroFlow">
        <svg class="login-brand-logo" viewBox="0 0 64 64" role="img" aria-hidden="true" focusable="false">
          <defs>
            <linearGradient id="login-brand-grad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#0f5fce" />
              <stop offset="100%" stop-color="#0a8a66" />
            </linearGradient>
          </defs>
          <rect x="6" y="6" width="52" height="52" rx="14" fill="url(#login-brand-grad)" />
          <path d="M18 42V22h6l8 11 8-11h6v20h-6V31l-8 10-8-10v11z" fill="#fff" />
          <circle cx="50" cy="14" r="4" fill="#d5ffe7" />
        </svg>
        <span class="login-brand-wordmark">MacroFlow</span>
      </div>
      <p>Continue with your Google account to use the app.</p>
      <button id="google-login-btn" class="google-btn" type="button">
        Continue with Google
      </button>
      <p id="error" class="error" hidden>Google sign-in failed. Please try again.</p>
      <p id="login-version" class="version" hidden></p>
    </main>

    <script src="/login.js"></script>
  </body>
</html>
