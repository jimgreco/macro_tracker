services:
  db:
    image: postgres:16
    container_name: macro_tracker_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: macro_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d macro_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
